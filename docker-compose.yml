services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=  # empty = use nginx proxy (relative /api/ calls)
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
