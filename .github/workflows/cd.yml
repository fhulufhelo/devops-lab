name: CD

# Trigger: only after CI passes on main (not on PRs)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false # don't cancel in-progress deploys

jobs:
  # ──────────────────────────────────────────
  # Build images and push to ACR
  # ──────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag
        id: meta
        run: echo "tag=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & push backend
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/backend:${{ steps.meta.outputs.tag }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/backend:latest \
            ./backend
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/backend --all-tags

      - name: Build & push frontend
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ steps.meta.outputs.tag }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend:latest \
            ./frontend
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/frontend --all-tags

  # ──────────────────────────────────────────
  # Deploy to Azure Container Apps
  # ──────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend
        run: |
          az containerapp update \
            --name ca-backend-dev \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/backend:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name ca-frontend-dev \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ needs.build-and-push.outputs.image-tag }}

      - name: Verify deployment
        run: |
          echo "⏳ Waiting 30s for containers to start..."
          sleep 30

          BACKEND_URL=$(az containerapp show \
            --name ca-backend-dev \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          FRONTEND_URL=$(az containerapp show \
            --name ca-frontend-dev \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "🔍 Checking backend health..."
          curl -sf --max-time 10 "https://${BACKEND_URL}/api/health" || (echo "❌ Backend health check failed" && exit 1)
          echo ""

          echo "🔍 Checking frontend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://${FRONTEND_URL}/")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend is live (HTTP ${STATUS})"
          else
            echo "❌ Frontend returned HTTP ${STATUS}" && exit 1
          fi

          echo ""
          echo "🚀 Deployment successful!"
          echo "   Backend:  https://${BACKEND_URL}"
          echo "   Frontend: https://${FRONTEND_URL}"
